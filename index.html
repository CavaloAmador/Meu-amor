<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Você</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4a4a4a;
        }

        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .icon {
            font-size: 30px;
            margin-bottom: 20px;
            color: #9b9b9b;
        }

        /* Estilo elegante para as Aspas e o Texto */
        blockquote {
            font-size: 18px;
            font-style: italic;
            line-height: 1.8;
            color: #555;
            margin-bottom: 25px;
            position: relative;
            padding: 0 10px;
        }

        blockquote::before {
            content: "“";
            font-size: 50px;
            color: #e0e0e0;
            position: absolute;
            top: -25px;
            left: -10px;
            font-family: Georgia, serif;
        }

        blockquote::after {
            content: "”";
            font-size: 50px;
            color: #e0e0e0;
            position: absolute;
            bottom: -45px;
            right: -10px;
            font-family: Georgia, serif;
        }

        .assinatura {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9b9b9b;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">✨</div>
        
        <!-- O Pedido de Desculpas Delicado em Aspas -->
        <blockquote>
            Sei que palavras não apagam o que aconteceu, mas meu arrependimento é sincero. Se errei, foi na tentativa de acertar. Espero que, no seu tempo, você consiga lembrar de nós com o mesmo carinho que ainda guardo aqui dentro. Me desculpa?
        </blockquote>

        <div class="assinatura">Com carinho</div>
    </div>

</body>
</html>
